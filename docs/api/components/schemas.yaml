StudentRegisterRequest:
  type: object
  required: [email, password, name, class_id, gender, date_of_birth, telephone_number, province, regency, district, subdistrict]
  properties:
    email: { type: string, format: email }
    password: { type: string, format: password }
    name: { type: string }
    class_id: { type: integer }
    gender: { type: string, enum: [male, female] }
    date_of_birth: { type: string, format: date }
    telephone_number: { type: string }
    province: { type: string }
    regency: { type: string }
    district: { type: string }
    subdistrict: { type: string }
    google_id: { type: string, example: nullable }
    facebook_id: { type: string, example: nullable }

Bank:
  type: object
  properties:
    bank_code: { type: string }
    bank_name: { type: string }

PackageItem:
  type: object
  properties:
    id:
      type: integer
      example: 1
    package_name:
      type: string
      example: "Paket Reguler"
    total_session:
      type: string
      example: "12 Sesi"
    base_price:
      type: number
      format: float
      example: 1500000
    discount_rate:
      type: number
      format: float
      example: 0.1
    final_price:
      type: number
      format: float
      example: 1350000
    info:
      type: string
      nullable: true
      example: "Paket belajar 3 bulan"
    image_url:
      type: string
      format: uri
      nullable: true
      example: "http://localhost:8000/storage/packages/package-1.jpg"

PaginationMeta:
  type: object
  properties:
    current_page:
      type: integer
      example: 1
    last_page:
      type: integer
      example: 3
    per_page:
      type: integer
      example: 10
    total:
      type: integer
      example: 25

ClassEntity:
  type: object
  properties:
    id:
      type: integer
      example: 1
    name:
      type: string
      example: "Matematika"
    level:
      type: string
      example: "SD"

ClassLevelResponse:
  type: object
  properties:
    status:
      type: string
      example: "success"
    level:
      type: array
      items:
        type: string
      example: ["SD", "SMP", "SMA"]

ClassListResponse:
  type: object
  properties:
    status:
      type: string
      example: "success"
    data:
      type: array
      items:
        $ref: '#/ClassEntity'
    meta:
      $ref: '#/PaginationMeta'

ClassByLevelResponse:
  type: object
  properties:
    status:
      type: string
      example: "success"
    classes:
      type: array
      items:
        $ref: '#/ClassEntity'

SubjectEntity:
  type: object
  properties:
    id:
      type: integer
      nullable: true
      example: 1
    name:
      type: string
      example: "Fisika"
    icon_image_path:
      type: string
      nullable: true
      example: "/storage/subjects/fisika.png"
    classId:
      type: integer
      nullable: true
      example: 1
    className:
      type: string
      nullable: true
      example: "Kelas 10"
    classLevel:
      type: string
      nullable: true
      example: "SMA"

SubjectListResponse:
  type: object
  properties:
    success:
      type: string
      example: "success"
    data:
      type: array
      items:
        $ref: '#/SubjectEntity'
    meta:
      $ref: '#/PaginationMeta'

UniqueSubjectEntity:
  type: object
  properties:
    name:
      type: string
      example: "Fisika"
    icon_image_path:
      type: string
      nullable: true
      example: "/storage/subjects/fisika.png"

UniqueSubjectByLevelResponse:
  type: object
  properties:
    success:
      type: string
      example: "success"
    data:
      type: array
      items:
        $ref: '#/UniqueSubjectEntity'
    meta:
      $ref: '#/PaginationMeta'

FilterCategorySubjects:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/SubjectEntity'
    meta:
      $ref: '#/PaginationMeta'

FilterCategoryPageData:
  type: object
  properties:
    levels:
      type: array
      nullable: true
      items:
        type: string
      example: ["SD", "SMP", "SMA"]
    subjects:
      type: object
      nullable: true
      allOf:
        - $ref: '#/FilterCategorySubjects'

FilterCategoryPageResponse:
  type: object
  properties:
    status:
      type: string
      example: "success"
    data:
      $ref: '#/FilterCategoryPageData'

GetPackagesResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/PackageItem'
    meta:
      $ref: '#/PaginationMeta'

AuthSuccess:
  type: object
  properties:
    status: { type: string, example: "success" }
    data:
      type: object
      properties:
        message: { type: string }
        access_token: { type: string }
        token_type: { type: string }

OAuthUserNew:
  type: object
  properties:
    status: { type: string, example: "success" }
    data:
      type: object
      properties:
        message: { type: string }
        name: { type: string }
        email: { type: string }
        provider_id: { type: string }

GenderEnum:
  type: string
  enum: [male, female]
  description: "Nilai yang valid untuk jenis kelamin"

ReligionEnum:
  type: string
  enum: [islam, kristen, katolik, hindu, buddha, konghucu]
  description: "Nilai yang valid untuk agama"

