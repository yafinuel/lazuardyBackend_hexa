UpdateTutorBiodataRequest:
  type: object
  required: [province, regency, district, subdistrict]
  properties:
    name:
      type: string
      maxLength: 255
      example: "John Doe"
    date_of_birth:
      type: string
      format: date
      example: "2000-05-15"
    gender:
      allOf:
        - $ref: '#/GenderEnum'
      example: "male"
    religion:
      allOf:
        - $ref: '#/ReligionEnum'
      example: "islam"
    telephone_number:
      type: string
      example: "081234567890"
    province:
      type: string
      example: "DKI Jakarta"
    regency:
      type: string
      example: "Jakarta Pusat"
    district:
      type: string
      example: "Tanah Abang"
    subdistrict:
      type: string
      example: "Bendungan Hilir"
    latitude:
      type: number
      format: float
      example: -6.2088
    longitude:
      type: number
      format: float
      example: 106.8456
    education:
      type: array
      items:
        type: string
      example: ["S1", "S2"]
    description:
      type: string
      example: "Tutor matematika berpengalaman"
    bankCode:
      type: string
      example: "ID_BSI"
    accountNumber:
      type: string
      example: "7123456789"
    learningMethod:
      type: array
      items:
        type: string
      example: ["online", "offline"]
    status:
      type: string
      example: "active"

UpdateStudentBiodataRequest:
  type: object
  required: [province, regency, district, subdistrict]
  properties:
    name:
      type: string
      maxLength: 255
      example: "John Doe"
    telephone_number:
      type: string
      maxLength: 20
      example: "081234567890"
    date_of_birth:
      type: string
      format: date
      example: "2000-05-15"
    gender:
      allOf:
        - $ref: '#/GenderEnum'
      example: "male"
    religion:
      allOf:
        - $ref: '#/ReligionEnum'
      example: "islam"
    province:
      type: string
      example: "DKI Jakarta"
    regency:
      type: string
      example: "Jakarta Pusat"
    district:
      type: string
      example: "Tanah Abang"
    subdistrict:
      type: string
      example: "Bendungan Hilir"
    class_id:
      type: integer
      example: 1
    latitude:
      type: number
      format: float
      example: -6.2088
    longitude:
      type: number
      format: float
      example: 106.8456

