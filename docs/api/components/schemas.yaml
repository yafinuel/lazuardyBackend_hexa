FilterCategoryPageData:
  type: object
  properties:
    levels:
      type: array
      nullable: true
      description: |
        Daftar jenjang untuk kategori akademik (contoh: SD, SMP, SMA).
        Bernilai null jika category=umum.
      items:
        type: string
      example: ["SD", "SMP", "SMA"]
    subjects:
      type: object
      nullable: true
      description: |
        Daftar subject hasil filter.
        Untuk category=umum, subject diambil dari level umum (representasi non-akademik).
        Bernilai null jika category tidak dikirim.
      allOf:
        - $ref: '#/FilterCategorySubjects'

