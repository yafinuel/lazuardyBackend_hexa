UpdateStudentBiodata:
  description: "Payload untuk memperbarui biodata siswa"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/UpdateStudentBiodataRequest'

UpdateTutorBiodata:
  description: "Payload untuk memperbarui biodata tutor"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/UpdateTutorBiodataRequest'

UpdateTeachingProfile:
  description: "Payload untuk memperbarui profil mengajar tutor (deskripsi, metode pembelajaran, dan jadwal ketersediaan)"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/UpdateTeachingProfileRequest'

UpdateFcmToken:
  description: "Payload untuk menyimpan FCM token pengguna"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/UpdateFcmTokenRequest'

ClearFcmToken:
  description: "Payload untuk menghapus FCM token perangkat pengguna"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ClearFcmTokenRequest'

CreateMeetingSchedule:
  description: "Payload untuk membuat jadwal meeting siswa"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/CreateMeetingScheduleRequest'

CreateTutorPresence:
  description: "Payload untuk membuat report/presence oleh tutor"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/CreateTutorPresenceRequest'

BookingConfirmation:
  description: "Payload untuk tutor mengonfirmasi atau menolak booking jadwal"
  required: true
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/BookingConfirmationRequest'
      examples:
        acceptExample:
          summary: Tutor menerima booking
          value:
            schedule_id: 1
            decision: accept
        rejectExample:
          summary: Tutor menolak booking
          value:
            schedule_id: 1
            decision: reject
