getBankList:
  get:
    tags:
      - Payment Gateway
    security: []
    summary: Mendapatkan daftar bank
    operationId: getBankList
    responses:
      '200':
        description: Berhasil
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, example: "success" }
                data:
                  type: array
                  items:
                    $ref: '../components/schemas.yaml#/Bank'
      '400':
        description: Permintaan tidak valid

validateBankAccount:
  post:
    tags:
      - Payment Gateway
    security: []
    summary: Memvalidasi nomor rekening
    operationId: validateBankAccount
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [bank_code, account_number]
            properties:
              bank_code: { type: string, example: "ID_BSI" }
              account_number: { type: string, example: "1234567890" }
    responses:
      '200':
        description: Validasi rekening berhasil/gagal
        content:
          application/json:
            examples:
              SuccessCondition:
                value: { status: "success", account_holder_name: "FETCH_HOLDER_NAME" }
              ValidationFailed:
                value: { status: "error", message: "Gagal memverifikasi rekening", error_code: "API_ERROR" }
      '400':
        description: Permintaan tidak valid

orderPackage:
  post:
    tags:
      - Payment Gateway
    security:
      - bearerAuth: []
    summary: Membuat order paket belajar
    operationId: orderPackage
    description: Endpoint untuk membuat order paket belajar dan mendapatkan URL checkout pembayaran melalui Xendit. Hanya dapat diakses oleh user dengan role student.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/OrderPackageRequest'
          example:
            packages:
              - id: 1
                quantity: 2
              - id: 2
                quantity: 1
    responses:
      '200':
        description: Order berhasil dibuat, mengembalikan checkout URL
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OrderCheckoutResponse'
            example:
              status: "success"
              data:
                order_id: 1
                checkout_url: "https://xendit.co/web/invoices/..."
      '400':
        description: Validasi request gagal atau data tidak valid
        content:
          application/json:
            examples:
              ValidationError:
                value:
                  message: "The packages field is required."
                  errors:
                    packages:
                      - "The packages field is required."
      '401':
        description: Unauthorized - Token tidak valid atau tidak ada
      '403':
        description: Forbidden - Hanya student yang dapat mengakses endpoint ini
      '500':
        description: Error saat membuat invoice atau database transaction gagal
        content:
          application/json:
            example:
              message: "Gagal melakukan checkout: Gagal membuat invoice: Invalid input data"
              exception: "Exception"

getOrderById:
  get:
    tags:
      - Payment Gateway
    security:
      - bearerAuth: []
    summary: Mendapatkan detail order
    description: Endpoint untuk mendapatkan detail order paket yang sedang dipilih user. Membutuhkan autentikasi.
    operationId: getOrderById
    parameters:
      - name: orderId
        in: path
        required: true
        description: ID order yang ingin diambil detailnya
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: Berhasil mendapatkan detail order
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OrderDetailResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/UnauthorizedError'
      '404':
        $ref: '../components/responses.yaml#/NotFoundError'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

payoutRequest:
  post:
    tags:
      - Payment Gateway
    security:
      - bearerAuth: []
    summary: Permintaan pencairan saldo oleh tutor
    operationId: payoutRequest
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, bank_account_id]
            properties:
              amount:
                type: number
                format: float
                example: 500000
              bank_account_id:
                type: string
                example: "12345678"
              note:
                type: string
                example: "Pencairan saldo bulan Mei"
    responses:
      '200':
        description: Permintaan payout berhasil dibuat
        content:
          application/json:
            example:
              status: success
              data:
                payout_id: 1
                status: pending
      '400':
        description: Validasi request gagal
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
      '500':
        description: Internal Server Error - Terjadi kesalahan pada server saat memproses payout
        content:
          application/json:
            example:
              status: "error"
              message: "Terjadi kesalahan pada server saat memproses payout"
              debug_error: "Exception message or database error details"

getPayoutHistory:
  get:
    tags:
      - Payment Gateway
    security:
      - bearerAuth: []
    summary: Mendapatkan riwayat payout untuk tutor (terpaginate)
    operationId: getPayoutHistory
    description: "Mengembalikan daftar payout yang diminta oleh tutor. Mendukung filter status dan pagination."
    parameters:
      - name: status
        in: query
        description: "Filter status payout (contoh: pending, success, failed)"
        schema:
          type: string
      - name: page
        in: query
        description: "Nomor halaman (pagination)"
        schema:
          type: integer
          default: 10
      - name: per_page
        in: query
        description: "Jumlah item per halaman (pagination)"
        schema:
          type: integer
          default: 10
    responses:
      '200':
        description: Daftar payout berhasil diambil
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    current_page: { type: integer, example: 1 }
                    per_page: { type: integer, example: 10 }
                    total: { type: integer, example: 42 }
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: integer, example: 1 }
                          payout_number: { type: string, example: "PAYOUT-202605-0001" }
                          amount: { type: number, format: float, example: 500000 }
                          bank_code: { type: string, example: "ID_BSI" }
                          account_holder_name: { type: string, example: "Budi" }
                          account_number: { type: string, example: "12345678" }
                          status: { type: string, example: "pending" }
                          xendit_id: { type: string, nullable: true }
                          created_at: { type: string, format: date-time }
      '401':
        description: Unauthorized - Token tidak valid atau tidak ada
      '403':
        description: Forbidden - Hanya tutor yang dapat mengakses endpoint ini
      '500':
        description: Internal Server Error

payoutApprovalFromAdmin:
  post:
    tags:
      - Payment Gateway
    security:
      - bearerAuth: []
    summary: Approval payout oleh admin
    operationId: payoutApprovalFromAdmin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [payout_id, approved]
            properties:
              payout_id:
                type: integer
                example: 1
              approved:
                type: boolean
                example: true
    responses:
      '200':
        description: Approval berhasil
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
      '404':
        description: Payout tidak ditemukan
      '500':
        description: Internal Server Error - Terjadi kesalahan pada server saat approval payout
        content:
          application/json:
            example:
              status: "error"
              message: "Terjadi kesalahan pada server saat memproses approval payout"
              debug_error: "Exception message or database error details"
