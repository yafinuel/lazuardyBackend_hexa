getScheduleById:
  get:
    tags:
      - Schedule
    summary: Mengambil detail jadwal berdasarkan ID
    description: Endpoint untuk mengambil satu data jadwal berdasarkan `schedule_id`. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: getScheduleById
    parameters:
      - name: schedule_id
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
        description: ID jadwal yang ingin diambil.
    responses:
      '200':
        description: Berhasil mengambil detail jadwal
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/GetScheduleByIdResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: The given data was invalid.
              errors:
                schedule_id:
                  - The schedule id field is required.
      '500':
        $ref: '../components/responses.yaml#/ServerError'

cancelSchedule:
  post:
    tags:
      - Schedule
    summary: Membatalkan jadwal berdasarkan ID
    description: Endpoint untuk membatalkan jadwal berdasarkan `schedule_id` dengan menyertakan `reason`. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: cancelSchedule
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - schedule_id
              - reason
            properties:
              schedule_id:
                type: integer
                minimum: 1
                example: 1
              reason:
                type: string
                maxLength: 255
                example: Tutor berhalangan hadir karena kondisi darurat
          example:
            schedule_id: 1
            reason: Tutor berhalangan hadir karena kondisi darurat
    responses:
      '200':
        description: Berhasil membatalkan jadwal
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                message:
                  type: string
                  example: Schedule cancelled successfully
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: The given data was invalid.
              errors:
                schedule_id:
                  - The schedule id field is required.
                reason:
                  - The reason field is required.
      '500':
        $ref: '../components/responses.yaml#/ServerError'

getTutorSchedulesByDay:
  get:
    tags:
      - Schedule
    summary: Mengambil jadwal availability tutor berdasarkan hari
    description: Endpoint untuk mengambil daftar jadwal availability milik tutor berdasarkan `tutor_id`. Parameter `day` bersifat opsional. Jika tidak diisi, semua jadwal tutor akan dikembalikan. Nilai `day` memakai format bahasa Indonesia lowercase seperti `senin`, `selasa`, dan seterusnya.
    security:
      - bearerAuth: []
    operationId: getTutorSchedulesByDay
    parameters:
      - name: tutor_id
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          example: 2
        description: ID user tutor yang jadwal availability-nya ingin diambil. Harus terdaftar di tabel tutors.
      - name: day
        in: query
        required: false
        schema:
          type: string
          enum: [senin, selasa, rabu, kamis, jumat, sabtu, minggu]
          example: senin
        description: Hari yang ingin difilter. Jika kosong, semua hari akan dikembalikan.
    responses:
      '200':
        description: Berhasil mengambil daftar jadwal availability tutor
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/TutorScheduleResponse'
            example:
              status: success
              data:
                current_page: 1
                data:
                  - id: 1
                    tutorId: 2
                    day: monday
                    time: '08:00:00'
                  - id: 2
                    tutorId: 2
                    day: wednesday
                    time: '10:00:00'
                first_page_url: 'http://localhost:8000/api/schedule/getTutorSchedulesByDay?tutor_id=2&page=1'
                from: 1
                last_page: 1
                last_page_url: 'http://localhost:8000/api/schedule/getTutorSchedulesByDay?tutor_id=2&page=1'
                links:
                  - url: null
                    label: '&laquo; Previous'
                    active: false
                  - url: 'http://localhost:8000/api/schedule/getTutorSchedulesByDay?tutor_id=2&page=1'
                    label: '1'
                    active: true
                  - url: null
                    label: 'Next &raquo;'
                    active: false
                next_page_url: null
                path: 'http://localhost:8000/api/schedule/getTutorSchedulesByDay'
                per_page: 10
                prev_page_url: null
                to: 2
                total: 2
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: 'Unauthenticated.'
      '404':
        description: Data tutor tidak ditemukan
        content:
          application/json:
            example:
              message: 'No query results for model [App\\Models\\Tutor].'
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

getFilteredSchedulesByTutorId:
  get:
    tags:
      - Schedule
    summary: Mengambil daftar jadwal tutor berdasarkan filter
    description: Endpoint untuk mengambil daftar jadwal milik tutor yang sedang login dengan filter `status`, `learning_method`, `student_id`, `subject_id`, dan `date`.
    security:
      - bearerAuth: []
    operationId: getFilteredSchedulesByTutorId
    parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [pending, active, completed, expired, cancelled, rejected]
          example: active
        description: Status jadwal yang ingin difilter.
      - name: learning_method
        in: query
        required: false
        schema:
          type: string
          enum: [online, offline]
          example: online
        description: Metode pembelajaran yang ingin difilter.
      - name: student_id
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          example: 1
        description: ID user student yang ingin difilter. Harus terdaftar di tabel students.
      - name: subject_id
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          example: 1
        description: ID mata pelajaran yang ingin difilter.
      - name: date
        in: query
        required: false
        schema:
          type: string
          format: date
          example: '2026-04-21'
        description: Tanggal jadwal yang ingin difilter dalam format Y-m-d.
    responses:
      '200':
        description: Berhasil mengambil daftar jadwal tutor berdasarkan filter
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/StudentScheduleResponse'
            example:
              status: success
              data:
                current_page: 1
                data:
                  - id: 1
                    tutorId: 2
                    studentId: 1
                    subjectId: 1
                    date: '2026-04-21 00:00:00'
                    startTime: '14:00:00'
                    endTime: '15:00:00'
                    status: active
                    learningMethod: online
                    meetingLink: null
                    address: null
                    tutorName: Demo Tutor
                    subjectName: Matematika
                    studentName: Demo Student
                    tutorTelephoneNumber: '081234567890'
                    studentTelephoneNumber: '081234567890'
                first_page_url: 'http://localhost:8000/api/schedule/filter?page=1'
                from: 1
                last_page: 1
                last_page_url: 'http://localhost:8000/api/schedule/filter?page=1'
                links:
                  - url: null
                    label: '&laquo; Previous'
                    page: null
                    active: false
                  - url: 'http://localhost:8000/api/schedule/filter?page=1'
                    label: '1'
                    page: 1
                    active: true
                  - url: null
                    label: 'Next &raquo;'
                    page: null
                    active: false
                next_page_url: null
                path: 'http://localhost:8000/api/schedule/filter'
                per_page: 10
                prev_page_url: null
                to: 1
                total: 1
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: 'Unauthenticated.'
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: The given data was invalid.
              errors:
                status:
                  - The selected status is invalid.
                learning_method:
                  - The selected learning method is invalid.
                student_id:
                  - The selected student id is invalid.
                subject_id:
                  - The selected subject id is invalid.
                date:
                  - The date field must match the format Y-m-d.
      '500':
        $ref: '../components/responses.yaml#/ServerError'

takeMeeting:
  post:
    tags:
      - Schedule
    summary: Membuat jadwal meeting untuk siswa
    description: Endpoint untuk membuat jadwal meeting baru. Data student diambil otomatis dari user yang sedang login, jadi client tidak perlu mengirim `student_id`. Membutuhkan autentikasi dan role student.
    security:
      - bearerAuth: []
    operationId: takeMeeting
    requestBody:
      $ref: '../components/request-bodies.yaml#/CreateMeetingSchedule'
    responses:
      '200':
        description: Meeting schedule berhasil dibuat
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/CreateMeetingScheduleResponse'
            example:
              status: success
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: 'Unauthenticated.'
      '403':
        description: Forbidden - Endpoint hanya untuk role student
        content:
          application/json:
            example:
              status: failed
              message: 'This page is Forbidden for tutor'
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        $ref: '../components/responses.yaml#/ServerError'