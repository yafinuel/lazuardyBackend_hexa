getScheduleById:
  get:
    tags:
      - Schedule
    summary: Mengambil detail jadwal berdasarkan ID
    description: Endpoint untuk mengambil satu data jadwal berdasarkan `schedule_id`. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: getScheduleById
    parameters:
      - name: schedule_id
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
        description: ID jadwal yang ingin diambil.
    responses:
      '200':
        description: Berhasil mengambil detail jadwal
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/GetScheduleByIdResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: The given data was invalid.
              errors:
                schedule_id:
                  - The schedule id field is required.
      '500':
        $ref: '../components/responses.yaml#/ServerError'

cancelSchedule:
  post:
    tags:
      - Schedule
    summary: Membatalkan jadwal berdasarkan ID
    description: Endpoint untuk membatalkan jadwal berdasarkan `schedule_id` dengan menyertakan `reason`. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: cancelSchedule
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - schedule_id
              - reason
            properties:
              schedule_id:
                type: integer
                minimum: 1
                example: 1
              reason:
                type: string
                maxLength: 255
                example: Tutor berhalangan hadir karena kondisi darurat
          example:
            schedule_id: 1
            reason: Tutor berhalangan hadir karena kondisi darurat
    responses:
      '200':
        description: Berhasil membatalkan jadwal
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                message:
                  type: string
                  example: Schedule cancelled successfully
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: The given data was invalid.
              errors:
                schedule_id:
                  - The schedule id field is required.
                reason:
                  - The reason field is required.
      '500':
        $ref: '../components/responses.yaml#/ServerError'