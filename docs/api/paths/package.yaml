getPackages:
  get:
    tags:
      - Package
    summary: Mendapatkan daftar paket belajar
    description: Endpoint untuk mendapatkan daftar paket belajar dengan informasi harga akhir dan metadata pagination. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: getPackages
    responses:
      '200':
        description: Berhasil mendapatkan daftar paket
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/GetPackagesResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."
      '400':
        description: Permintaan tidak valid
      '500':
        $ref: '../components/responses.yaml#/ServerError'

getPackageById:
  get:
    tags:
      - Package
    summary: Mendapatkan detail paket belajar
    description: Endpoint untuk mendapatkan detail paket belajar berdasarkan ID. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: getPackageById
    parameters:
      - name: id
        in: path
        required: true
        description: ID paket yang ingin diambil detailnya
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: Berhasil mendapatkan detail paket
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/PackageDetailResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/UnauthorizedError'
      '404':
        $ref: '../components/responses.yaml#/NotFoundError'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

