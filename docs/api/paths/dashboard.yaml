studentHomepage:
  get:
    tags:
      - Dashboard
    summary: Mengambil data homepage siswa
    description: Endpoint untuk mengambil ringkasan data homepage siswa yang sedang login. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: studentHomepage
    parameters:
      - name: notification_paginate
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          example: 2
        description: Jumlah notifikasi yang ditampilkan.
      - name: tutor_paginate
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          example: 4
        description: Jumlah rekomendasi tutor yang ditampilkan.
    responses:
      '200':
        description: Berhasil mengambil data homepage siswa
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    user_name:
                      type: string
                    warning:
                      type: integer
                      nullable: true
                    sanction:
                      type: string
                      format: date-time
                      nullable: true
                    session:
                      type: integer
                      nullable: true
                    notification:
                      $ref: '../components/schemas.yaml#/DashboardNotificationListPayload'
                    tutor_recomendation:
                      $ref: '../components/schemas.yaml#/TutorListPayload'
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."
      '500':
        $ref: '../components/responses.yaml#/ServerError'

studentSchedulePage:
  get:
    tags:
      - Dashboard
    summary: Mengambil jadwal siswa pada tanggal tertentu
    description: Endpoint untuk mengambil daftar jadwal milik siswa yang sedang login berdasarkan tanggal. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: studentSchedulePage
    parameters:
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
          example: '2026-04-21'
        description: Tanggal jadwal yang ingin diambil.
      - name: paginate
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          example: 10
        description: Jumlah data per halaman. Jika tidak diisi, default server adalah 10.
    responses:
      '200':
        description: Berhasil mengambil jadwal siswa
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/StudentScheduleResponse'
            example:
              status: success
              data:
                current_page: 1
                data:
                  - id: 1
                    tutorId: 2
                    studentId: 1
                    subjectId: 1
                    date: '2026-04-21 00:00:00'
                    startTime: '14:00:00'
                    endTime: '15:00:00'
                    status: pending
                    learningMethod: online
                    meetingLink: null
                    address: null
                    tutorName: Demo Tutor
                    subjectName: Matematika
                    studentName: Demo Student
                    tutorTelephoneNumber: '081234567890'
                    studentTelephoneNumber: '081234567890'
                first_page_url: 'http://localhost:8000/api/student/dashboard/schedule?page=1'
                from: 1
                last_page: 1
                last_page_url: 'http://localhost:8000/api/student/dashboard/schedule?page=1'
                links:
                  - url: null
                    label: '&laquo; Previous'
                    page: null
                    active: false
                  - url: 'http://localhost:8000/api/student/dashboard/schedule?page=1'
                    label: '1'
                    page: 1
                    active: true
                  - url: null
                    label: 'Next &raquo;'
                    page: null
                    active: false
                next_page_url: null
                path: 'http://localhost:8000/api/student/dashboard/schedule'
                per_page: 10
                prev_page_url: null
                to: 1
                total: 1
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: 'Unauthenticated.'
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: Data tidak valid
              errors:
                date:
                  - Tanggal jadwal wajib diisi.
                paginate:
                  - Jumlah data per halaman harus berupa bilangan bulat.
      '500':
        $ref: '../components/responses.yaml#/ServerError'

