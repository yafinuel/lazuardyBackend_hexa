registerOtpEmail:
  post:
    tags:
      - Authentication
    security: []
    summary: Mengirim OTP untuk Registrasi
    operationId: registerOtpEmail
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email, example: "user@example.com" }
    responses:
      '201':
        description: OTP Berhasil dikirim
        content:
          application/json:
            example: { status: "success" }
      '422':
        description: Validasi gagal saat mengirim OTP registrasi
        content:
          application/json:
            example:
              message: "The email field is required."
              errors:
                email:
                  - "The email field is required."
      '500':
        description: Gagal mengirim OTP. Status HTTP mengikuti exception code, dengan fallback 500.
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal mengirim OTP"
              debug_error: "SMTP Error..."

verifyOtpRegisterEmail:
  post:
    tags:
      - Authentication
    security: []
    summary: Verifikasi OTP untuk Registrasi
    operationId: verifyOtpRegisterEmail
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, otp]
            properties:
              email: { type: string, format: email }
              otp: { type: string, example: "1234" }
    responses:
      '200':
        description: Verifikasi berhasil/selesai
        content:
          application/json:
            example: { status: "success" }
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '403':
        description: OTP tidak valid
        content:
          application/json:
            example: { status: "error", message: "Gagal memverifikasi OTP", debug_error: "Kode OTP yang Anda masukkan salah." }
      '404':
        description: OTP tidak ditemukan atau kadaluwarsa
        content:
          application/json:
            example: { status: "error", message: "Gagal memverifikasi OTP", debug_error: "OTP tidak ditemukan atau sudah kedaluwarsa." }

forgotPasswordOtpEmail:
  post:
    tags:
      - Authentication
    security: []
    summary: Mengirim OTP untuk Lupa Password
    operationId: forgotPasswordOtpEmail
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
    responses:
      '201':
        description: OTP Berhasil dikirim
        content:
          application/json:
            example: { status: "success" }
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        description: Gagal mengirim OTP
        content:
          application/json:
            example: { status: "error", message: "Gagal mengirim OTP", debug_error: "Terjadi kesalahan sistem saat memproses OTP." }

forgotPasswordVerifyOtpEmail:
  post:
    tags:
      - Authentication
    security: []
    summary: Verifikasi OTP untuk Lupa Password
    operationId: forgotPasswordVerifyOtpEmail
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, otp]
            properties:
              email: { type: string, format: email }
              otp: { type: string }
    responses:
      '200':
        description: Verifikasi berhasil
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, example: success }
                reset_token: { type: string, example: PmBbJbJTiub0IbNe }
      '403':
        description: OTP salah
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal memverifikasi OTP"
              debug_error: "Kode OTP yang Anda masukkan salah."
      '404':
        description: OTP tidak ditemukan atau sudah kedaluwarsa
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal memverifikasi OTP"
              debug_error: "OTP tidak ditemukan atau sudah kedaluwarsa."
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        description: Internal Server Error
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal memverifikasi OTP"
              debug_error: "Terjadi kesalahan sistem saat memproses OTP."

forgotPasswordResetPassword:
  post:
    tags:
      - Authentication
    security: []
    summary: Reset password menggunakan token hasil verifikasi OTP
    operationId: forgotPasswordResetPassword
    description: |
      Endpoint ini digunakan untuk memperbarui password user setelah berhasil memverifikasi OTP.
      Token yang digunakan harus sesuai dengan yang disimpan di Cache pada tahap verifikasi.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
              - reset_token
            properties:
              email:
                type: string
                format: email
                example: "user@example.com"
              password:
                type: string
                format: password
                description: "Password baru minimal 8 karakter"
                minLength: 8
                example: "passwordBaru123"
              reset_token:
                type: string
                description: "Token unik yang didapat dari response forgotPasswordVerifyOtpEmail"
                example: "aB1cD2eF3gH4iJ5k"
    responses:
      '200':
        description: Password berhasil diperbarui
        content:
          application/json:
            example:
              status: "success"
      '403':
        description: Forbidden - Token tidak valid atau sudah kedaluwarsa
        content:
          application/json:
            example:
              status: "error"
              debug_error: "Token reset tidak valid atau sudah kedaluwarsa."
      '400':
        description: Bad Request - Kesalahan umum lainnya
        content:
          application/json:
            example:
              status: "error"
              debug_error: "User tidak ditemukan."
      '422':
        $ref: '../components/responses.yaml#/ValidationError'

registerOtpStudentParents:
  post:
    tags: [Authentication]
    security: []
    summary: Mengirim OTP untuk verifikasi orang tua siswa
    description: Endpoint untuk mengirim OTP ke email orang tua yang sudah terdaftar di sistem. Email harus sudah terdaftar sebagai user dengan role student.
    operationId: registerOtpStudentParents
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: "parent@example.com"
          example:
            email: "parent@example.com"
    responses:
      '201':
        description: OTP berhasil dikirim
        content:
          application/json:
            example:
              status: "success"
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: "The given data was invalid."
              errors:
                email:
                  - "The email field is required."
                  - "The email must be a valid email address."
                  - "The email does not exist."
      '500':
        description: Gagal mengirim OTP
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal mengirim OTP"
              debug_error: "Terjadi kesalahan sistem saat memproses OTP."

verifyOtpStudentParents:
  post:
    tags: [Authentication]
    security: []
    summary: Verifikasi OTP orang tua siswa
    description: Endpoint untuk memverifikasi OTP yang telah dikirim ke email orang tua. Jika verifikasi berhasil, akan mengembalikan reset_token yang dapat digunakan untuk registrasi orang tua.
    operationId: verifyOtpStudentParents
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - otp
            properties:
              email:
                type: string
                format: email
                example: "parent@example.com"
              otp:
                type: string
                example: "1234"
          example:
            email: "parent@example.com"
            otp: "1234"
    responses:
      '200':
        description: Verifikasi OTP berhasil
        content:
          application/json:
            example:
              status: "success"
      '404':
        description: OTP tidak ditemukan atau sudah kedaluwarsa
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal memverifikasi OTP"
              debug_error: "OTP tidak ditemukan atau sudah kedaluwarsa."
      '403':
        description: OTP tidak valid atau terlalu banyak percobaan
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal memverifikasi OTP"
              debug_error: "Kode OTP yang Anda masukkan salah."
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

parentRegister:
  post:
    tags: [Authentication]
    security: []
    summary: Registrasi orang tua siswa
    description: Endpoint untuk melakukan registrasi orang tua yang telah diverifikasi melalui OTP. Harus memiliki email unik dan student_id yang valid (sudah terdaftar di sistem).
    operationId: parentRegister
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
              - child_email
            properties:
              email:
                type: string
                format: email
                example: "parent@example.com"
              password:
                type: string
                minLength: 8
                example: "password123"
              child_email:
                type: string
                format: email
                example: "child@example.com"
          example:
            email: "parent@example.com"
            password: "password123"
            child_email: "child@example.com"
    responses:
      '201':
        description: Registrasi orang tua berhasil
        content:
          application/json:
            example:
              status: "success"
      '422':
        description: Validasi gagal
        content:
          application/json:
            example:
              message: "The given data was invalid."
              errors:
                email:
                  - "The email has already been taken."
                password:
                  - "The password must be at least 8 characters."
                child_email:
                  - "Child email is not associated with a student account."
      '500':
        $ref: '../components/responses.yaml#/ServerError'

authProviderRedirect:
  get:
    tags: [Authentication]
    security: []
    summary: Redirect ke Authentikasi OAuth
    operationId: authProviderRedirect
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
    responses:
      '200': { description: Berhasil redirect }
      '400': { description: Provider tidak valid }

authProviderCallback:
  get:
    tags: [Authentication]
    security: []
    summary: Callback dari OAuth
    operationId: authProviderCallback
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Berhasil callback
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../components/schemas.yaml#/AuthSuccess'
                - $ref: '../components/schemas.yaml#/OAuthUserNew'
      '400':
        description: Provider tidak valid atau callback gagal

login:
  post:
    tags: [Authentication]
    security: []
    summary: Login secara manual
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          example:
            email: "user@example.com"
            password: "password123"
    responses:
      '200':
        description: Berhasil login
        content:
          application/json:
            example:
              status: "success"
              access_token: "1|..."
              role: "student"
              token_type: "Bearer"
      '422':
        $ref: '../components/responses.yaml#/ValidationError'

logout:
  post:
    tags:
      - Authentication
    summary: Logout pengguna
    description: Mengakhiri sesi pengguna yang sedang login. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: logout
    responses:
      '200':
        description: Berhasil logout
        content:
          application/json:
            example:
              status: "success"
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."

currentUser:
  get:
    tags:
      - Authentication
    summary: Mendapatkan data user aktif
    description: Endpoint utilitas untuk mengambil data user yang sedang login. Membutuhkan autentikasi.
    security:
      - bearerAuth: []
    operationId: currentUser
    responses:
      '200':
        description: Berhasil mengambil data user aktif
        content:
          application/json:
            schema:
              type: object
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              message: "Unauthenticated."

studentRegister:
  post:
    tags: [Authentication]
    security: []
    summary: Mendaftarkan user siswa baru
    operationId: studentRegister
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/StudentRegisterRequest'
    responses:
      '200':
        description: Berhasil mendaftar
        content:
          application/json:
            example:
              status: "success"
              access_token: "1|..."
              token_type: "Bearer"
      '422': { $ref: '../components/responses.yaml#/ValidationError' }
      '500':
        description: Gagal mendaftar
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal melakukan registrasi siswa."
              debug_error: "Terjadi kesalahan saat menyimpan data ke sistem."

tutorRegister:
  post:
    tags:
      - Authentication
    security: []
    summary: Mendaftarkan user tutor baru (dengan upload file)
    operationId: tutorRegister
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - email
              - password
              - name
              - gender
              - description
              - date_of_birth
              - telephone_number
              - account_holder_name
              - bank_code
              - account_number
              - province
              - regency
              - district
              - subdistrict
              - subject_id
              - learning_method
              - schedules
              - curriculum_vitae
              - id_card
              - certificate
            properties:
              email:
                type: string
                format: email
                description: Alamat email tutor
              password:
                type: string
                description: Password minimal 8 karakter
              name:
                type: string
                description: Nama lengkap tutor
              gender:
                type: string
                description: Jenis kelamin (gunakan enum yang sesuai)
              description:
                type: string
                description: Deskripsi profil / bio tutor
              date_of_birth:
                type: string
                format: date
                description: Tanggal lahir (YYYY-MM-DD)
              telephone_number:
                type: string
                description: Nomor telepon
              account_holder_name:
                type: string
                description: Nama pemilik rekening
              bank_code:
                type: string
                description: "Kode bank (contoh: ID_BSI)"
              account_number:
                type: string
                description: Nomor rekening bank
              profile_photo:
                type: string
                format: binary
                description: Foto profil (opsional)
              province:
                type: string
              regency:
                type: string
              district:
                type: string
              subdistrict:
                type: string
              google_id:
                type: string
                nullable: true
              facebook_id:
                type: string
                nullable: true
              subject_id:
                type: integer
                description: ID mata pelajaran yang diajar
              learning_method:
                type: array
                items:
                  type: string
                description: Metode pembelajaran (mis. online, offline)
              schedules:
                type: array
                items:
                  type: object
                  required: [day, time]
                  properties:
                    day:
                      type: string
                      description: Hari ketersediaan (mis. Monday)
                    time:
                      type: string
                      description: Waktu dalam format HH:MM
              curriculum_vitae:
                type: string
                format: binary
                description: CV dalam format PDF
              id_card:
                type: string
                format: binary
                description: KTP atau identitas lain (pdf/jpg/png)
              certificate:
                type: string
                format: binary
                description: Sertifikat (PDF)
    responses:
      '200':
        description: Berhasil mendaftar
        content:
          application/json:
            example:
              status: "success"
              access_token: "1|..."
              token_type: "Bearer"
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        description: Gagal melakukan registrasi tentor.
        content:
          application/json:
            example:
              status: "error"
              message: "Gagal melakukan registrasi tentor."
              debug_error: "Terjadi kesalahan saat menyimpan data ke sistem."
