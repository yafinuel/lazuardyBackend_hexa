openapi: 3.0.0
info:
  title: Lazuardy API Documentation
  description: Dokumentasi API untuk backend Lazuardy
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Local Server

tags:
  - name: Authentication
    description: Endpoint untuk Login, Register, dan OAuth
  - name: Payment Gateway
    description: Hal-hal yang berkaitan dengan keuangan

paths:  
  /registerOtpEmail:
      post:
        tags:
          - Authentication
        summary: Mengirim OTP untuk Registrasi
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required: [email]
                properties:
                  email: { type: string, format: email, example: "user@example.com" }
        responses:
          '201':
            description: OTP Berhasil dikirim
            content:
              application/json:
                example: { status: "success" }
          '500':
            description: Gagal mengirim OTP
            content:
              application/json:
                example: { status: "error", message: "Gagal mengirim OTP", debug_error: "SMTP Error..." }

  /verifyOtpRegisterEmail:
    post:
      tags:
        - Authentication
      summary: Verifikasi OTP untuk Registrasi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email: { type: string, format: email }
                otp: { type: string, example: "123456" }
      responses:
        '200':
          description: Verifikasi berhasil/selesai
          content:
            application/json:
              example: { status: "verified" }
        '404':
          description: OTP tidak valid atau kadaluwarsa
          content:
            application/json:
              example: { status: "error", message: "Gagal memverifikasi OTP", debug_error: "OTP mismatch" }

  /forgotPasswordOtpEmail:
    post:
      tags:
        - Authentication
      summary: Mengirim OTP untuk Lupa Password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '201':
          description: OTP Berhasil dikirim
        '500':
          $ref: '#/components/responses/ServerError'

  /forgotPasswordVerifyOtpEmail:
    post:
      tags:
        - Authentication
      summary: Verifikasi OTP untuk Lupa Password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email: { type: string, format: email }
                otp: { type: string }
      responses:
        '200':
          description: Verifikasi berhasil
        '404':
          description: OTP salah
  /forgotPasswordResetPassword:
    post:
      tags:
        - Authentication
      summary: Reset password menggunakan token hasil verifikasi OTP
      description: |
        Endpoint ini digunakan untuk memperbarui password user setelah berhasil memverifikasi OTP.
        Token yang digunakan harus sesuai dengan yang disimpan di Cache pada tahap verifikasi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - reset_token
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  description: "Password baru minimal 8 karakter"
                  minLength: 8
                  example: "passwordBaru123"
                reset_token:
                  type: string
                  description: "Token unik yang didapat dari response verifyOtpRegisterEmail"
                  example: "aB1cD2eF3gH4iJ5k"
      responses:
        '200':
          description: Password berhasil diperbarui
          content:
            application/json:
              example:
                status: "success"
        '403':
          description: Forbidden - Token tidak valid atau sudah kedaluwarsa
          content:
            application/json:
              example:
                status: "error"
                debug_error: "Token reset tidak valid atau sudah kedaluwarsa."
        '400':
          description: Bad Request - Kesalahan umum lainnya
          content:
            application/json:
              example:
                status: "error"
                debug_error: "User tidak ditemukan."
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/{provider}/redirect:
    get: 
      tags: [Authentication]
      summary: Redirect ke Authentikasi OAuth
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Berhasil redirect }

  /auth/{provider}/callback:
    get:
      tags: [Authentication]
      summary: Callback dari OAuth
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Berhasil callback
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthSuccess'
                  - $ref: '#/components/schemas/OAuthUserNew'

  /login:
    post:
      tags: [Authentication]
      summary: Login secara manual
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "user@example.com"
              password: "password123"
      responses:
        '200':
          description: Berhasil login
          content:
            application/json:
              example:
                status: "success"
                access_token: "1|..."
                token_type: "Bearer"
        '422':
          $ref: '#/components/responses/ValidationError'

  /studentRegister:
    post:
      tags: [Authentication]
      summary: Mendaftarkan user siswa baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRegisterRequest'
      responses:
        '201': { description: Berhasil mendaftar }
        '500': { description: Gagal mendaftar }

  /tutorRegister:
    post:
      tags:
        - Authentication
      summary: Mendaftarkan user tutor baru (dengan upload file)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: 
                - email
                - password
                - name
                - gender
                - description
                - date_of_birth
                - telephone_number
                - bank_code
                - account_number
                - province
                - regency
                - district
                - subdistrict
                - subject_id
                - learning_method
                - schedules
                - curriculum_vitae
                - id_card
                - certificate
              properties:
                email: { type: string, format: email, example: "tutor@example.com" }
                password: { type: string, format: password, example: "password123" }
                name: { type: string, example: "Lazuardy Tutor" }
                gender: { type: string, enum: [male, female], example: "male" }
                description: { type: string, example: "Saya adalah guru matematika berpengalaman." }
                date_of_birth: { type: string, format: date, example: "1995-01-01" }
                telephone_number: { type: string, example: "08123456789" }
                bank_code: { type: string, example: "ID_BSI" }
                account_number: { type: string, example: "7123456789" }
                province: { type: string, example: "Jawa Timur" }
                regency: { type: string, example: "Malang" }
                district: { type: string, example: "Lowokwaru" }
                subdistrict: { type: string, example: "Tulusrejo" }
                google_id: { type: string, nullable: true }
                facebook_id: { type: string, nullable: true }
                subject_id: { type: integer, example: 1 }
                learning_method: 
                  type: array
                  items: { type: string }
                  example: ["online", "offline"]
                schedules:
                  type: array
                  description: "Kirim sebagai array of objects"
                  items:
                    type: object
                    properties:
                      day: { type: string, example: "Monday" }
                      time: { type: string, example: "14:00" }
                # --- BAGIAN FILE ---
                curriculum_vitae:
                  type: string
                  format: binary
                  description: "Upload file PDF"
                id_card:
                  type: string
                  format: binary
                  description: "Upload file PDF/JPG/PNG"
                certificate:
                  type: string
                  format: binary
                  description: "Upload file PDF"
      responses:
        '201':
          description: Berhasil mendaftar
          content:
            application/json:
              example:
                status: "success"
                access_token: "1|..."
                token_type: "Bearer"
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          description: Gagal melakukan registrasi tutor.
          content:
            application/json:
              example:
                status: "error"
                message: "Gagal melakukan registrasi tutor."

  /banks:
    get:
      tags:
        - Payment Gateway
      summary: Mendapatkan daftar bank
      responses:
        '200':
          description: Berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bank'

  /validateBankAccount:
    post:
      tags:
        - Payment Gateway
      summary: Memvalidasi nomor rekening
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bank_code, account_number]
              properties:
                bank_code: { type: string, example: "ID_BSI" }
                account_number: { type: string, example: "1234567890" }
      responses:
        '200':
          description: Validasi rekening berhasil/gagal
          content:
            application/json: 
              examples:
                SuccessCondition:
                  value: { status: "success", account_holder_name: "FETCH_HOLDER_NAME" }
                ValidationFailed:
                  value: { status: "error", message: "Gagal memverifikasi rekening", error_code: "API_ERROR" }
components:
  responses:
    ValidationError:
      description: Validasi Gagal
      content:
        application/json:
          example:
            message: "Data tidak valid"
            errors:
              email: ["Email sudah terdaftar"]
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          example:
            status: "error"
            message: "Terjadi kesalahan pada server"

  schemas:
    StudentRegisterRequest:
      type: object
      required: [email, password, name, class_id, gender, date_of_birth, telephone_number, province, regency, district, subdistrict]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        name: { type: string }
        class_id: { type: integer }
        gender: { type: string, enum: [male, female] }
        date_of_birth: { type: string, format: date }
        telephone_number: { type: string }
        province: { type: string }
        regency: { type: string }
        district: { type: string }
        subdistrict: { type: string }

    Bank:
      type: object
      properties:
        bank_code: { type: string }
        bank_name: { type: string }

    AuthSuccess:
      type: object
      properties:
        status: { type: string, example: "success" }
        data:
          type: object
          properties:
            message: { type: string }
            access_token: { type: string }
            token_type: { type: string }

    OAuthUserNew:
      type: object
      properties:
        status: { type: string, example: "success" }
        data:
          type: object
          properties:
            message: { type: string }
            name: { type: string }
            email: { type: string }
            provider_id: { type: string }