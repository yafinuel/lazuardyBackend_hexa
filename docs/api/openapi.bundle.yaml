openapi: 3.0.0
info:
  title: Lazuardy API Documentation
  description: Dokumentasi API untuk backend Lazuardy
  version: 1.0.0
  license:
    name: Proprietary
    url: http://127.0.0.1:8000
servers:
  - url: http://127.0.0.1:8000/api
    description: Local Server
tags:
  - name: Authentication
    description: Endpoint untuk Login, Register, dan OAuth
  - name: Payment Gateway
    description: Hal-hal yang berkaitan dengan keuangan
  - name: Package
    description: Endpoint untuk daftar paket belajar
  - name: Class
    description: Endpoint untuk data kelas dan jenjang
  - name: Subject
    description: Endpoint untuk data mata pelajaran
  - name: Course Catalog
    description: Endpoint untuk filter halaman kategori kursus
  - name: User Profile
    description: Endpoint untuk profil pengguna
  - name: Notification
    description: Endpoint untuk notifikasi pengguna
  - name: Tutor
    description: Endpoint untuk pencarian tutor
  - name: Dashboard
    description: Endpoint untuk data dashboard pengguna
  - name: Schedule
    description: Endpoint untuk detail jadwal
  - name: Report
    description: Endpoint untuk laporan siswa
paths:
  /registerOtpEmail:
    post:
      tags:
        - Authentication
      security: []
      summary: Mengirim OTP untuk Registrasi
      operationId: registerOtpEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '201':
          description: OTP Berhasil dikirim
          content:
            application/json:
              example:
                status: success
        '422':
          description: Validasi gagal saat mengirim OTP registrasi
          content:
            application/json:
              example:
                message: The email field is required.
                errors:
                  email:
                    - The email field is required.
        '500':
          description: Gagal mengirim OTP. Status HTTP mengikuti exception code, dengan fallback 500.
          content:
            application/json:
              example:
                status: error
                message: Gagal mengirim OTP
                debug_error: SMTP Error...
  /verifyOtpRegisterEmail:
    post:
      tags:
        - Authentication
      security: []
      summary: Verifikasi OTP untuk Registrasi
      operationId: verifyOtpRegisterEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  example: '1234'
      responses:
        '200':
          description: Verifikasi berhasil/selesai
          content:
            application/json:
              example:
                status: success
        '403':
          description: OTP tidak valid
          content:
            application/json:
              example:
                status: error
                message: Gagal memverifikasi OTP
                debug_error: Kode OTP yang Anda masukkan salah.
        '404':
          description: OTP tidak ditemukan atau kadaluwarsa
          content:
            application/json:
              example:
                status: error
                message: Gagal memverifikasi OTP
                debug_error: OTP tidak ditemukan atau sudah kedaluwarsa.
        '422':
          $ref: '#/components/responses/ValidationError'
  /forgotPasswordOtpEmail:
    post:
      tags:
        - Authentication
      security: []
      summary: Mengirim OTP untuk Lupa Password
      operationId: forgotPasswordOtpEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: OTP Berhasil dikirim
          content:
            application/json:
              example:
                status: success
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          description: Gagal mengirim OTP
          content:
            application/json:
              example:
                status: error
                message: Gagal mengirim OTP
                debug_error: Terjadi kesalahan sistem saat memproses OTP.
  /forgotPasswordVerifyOtpEmail:
    post:
      tags:
        - Authentication
      security: []
      summary: Verifikasi OTP untuk Lupa Password
      operationId: forgotPasswordVerifyOtpEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
      responses:
        '200':
          description: Verifikasi berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  reset_token:
                    type: string
                    example: PmBbJbJTiub0IbNe
        '403':
          description: OTP salah
          content:
            application/json:
              example:
                status: error
                message: Gagal memverifikasi OTP
                debug_error: Kode OTP yang Anda masukkan salah.
        '404':
          description: OTP tidak ditemukan atau sudah kedaluwarsa
          content:
            application/json:
              example:
                status: error
                message: Gagal memverifikasi OTP
                debug_error: OTP tidak ditemukan atau sudah kedaluwarsa.
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              example:
                status: error
                message: Gagal memverifikasi OTP
                debug_error: Terjadi kesalahan sistem saat memproses OTP.
  /forgotPasswordResetPassword:
    post:
      tags:
        - Authentication
      security: []
      summary: Reset password menggunakan token hasil verifikasi OTP
      operationId: forgotPasswordResetPassword
      description: |
        Endpoint ini digunakan untuk memperbarui password user setelah berhasil memverifikasi OTP.
        Token yang digunakan harus sesuai dengan yang disimpan di Cache pada tahap verifikasi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - reset_token
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  description: Password baru minimal 8 karakter
                  minLength: 8
                  example: passwordBaru123
                reset_token:
                  type: string
                  description: Token unik yang didapat dari response forgotPasswordVerifyOtpEmail
                  example: aB1cD2eF3gH4iJ5k
      responses:
        '200':
          description: Password berhasil diperbarui
          content:
            application/json:
              example:
                status: success
        '400':
          description: Bad Request - Kesalahan umum lainnya
          content:
            application/json:
              example:
                status: error
                debug_error: User tidak ditemukan.
        '403':
          description: Forbidden - Token tidak valid atau sudah kedaluwarsa
          content:
            application/json:
              example:
                status: error
                debug_error: Token reset tidak valid atau sudah kedaluwarsa.
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/{provider}/redirect:
    get:
      tags:
        - Authentication
      security: []
      summary: Redirect ke Authentikasi OAuth
      operationId: authProviderRedirect
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Berhasil redirect
        '400':
          description: Provider tidak valid
  /auth/{provider}/callback:
    get:
      tags:
        - Authentication
      security: []
      summary: Callback dari OAuth
      operationId: authProviderCallback
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Berhasil callback
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthSuccess'
                  - $ref: '#/components/schemas/OAuthUserNew'
        '400':
          description: Provider tidak valid atau callback gagal
  /login:
    post:
      tags:
        - Authentication
      security: []
      summary: Login secara manual
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: user@example.com
              password: password123
      responses:
        '200':
          description: Berhasil login
          content:
            application/json:
              example:
                status: success
                access_token: 1|...
                role: student
                token_type: Bearer
        '422':
          $ref: '#/components/responses/ValidationError'
  /logout:
    post:
      tags:
        - Authentication
      summary: Logout pengguna
      description: Mengakhiri sesi pengguna yang sedang login. Membutuhkan autentikasi.
      security:
        - bearerAuth: []
      operationId: logout
      responses:
        '200':
          description: Berhasil logout
          content:
            application/json:
              example:
                status: success
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                message: Unauthenticated.
  /studentRegister:
    post:
      tags:
        - Authentication
      security: []
      summary: Mendaftarkan user siswa baru
      operationId: studentRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRegisterRequest'
      responses:
        '200':
          description: Berhasil mendaftar
          content:
            application/json:
              example:
                status: success
                access_token: 1|...
                token_type: Bearer
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          description: Gagal mendaftar
          content:
            application/json:
              example:
                status: error
                message: Gagal melakukan registrasi siswa.
                debug_error: Terjadi kesalahan saat menyimpan data ke sistem.
  /tutorRegister:
    post:
      tags:
        - Authentication
      security: []
      summary: Mendaftarkan user tutor baru (dengan upload file)
      operationId: tutorRegister
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - email
                - password
                - name
                - gender
                - description
                - date_of_birth
                - telephone_number
                - bank_code
                - account_number
                - province
                - regency
                - district
                - subdistrict
                - subject_id
                - learning_method
                - schedules
                - curriculum_vitae
                - id_card
                - certificate
              properties:
                email:
                  type: string
                  format: email
                  example: tutor@example.com
                password:
                  type: string
                  format: password
                  example: password123
                name:
                  type: string
                  example: Lazuardy Tutor
                gender:
                  type: string
                  enum:
                    - male
                    - female
                  example: male
                description:
                  type: string
                  example: Saya adalah guru matematika berpengalaman.
                date_of_birth:
                  type: string
                  format: date
                  example: '1995-01-01'
                telephone_number:
                  type: string
                  example: '08123456789'
                bank_code:
                  type: string
                  example: ID_BSI
                account_number:
                  type: string
                  example: '7123456789'
                profile_photo:
                  type: string
                  format: binary
                  description: Upload foto profil (jpg/png/jpeg/svg/webp)
                province:
                  type: string
                  example: Jawa Timur
                regency:
                  type: string
                  example: Malang
                district:
                  type: string
                  example: Lowokwaru
                subdistrict:
                  type: string
                  example: Tulusrejo
                google_id:
                  type: string
                  nullable: true
                facebook_id:
                  type: string
                  nullable: true
                subject_id:
                  type: integer
                  example: 1
                learning_method:
                  type: array
                  items:
                    type: string
                  example:
                    - online
                    - offline
                schedules:
                  type: array
                  description: Kirim sebagai array of objects
                  items:
                    type: object
                    properties:
                      day:
                        type: string
                        example: Monday
                      time:
                        type: string
                        example: '14:00'
                curriculum_vitae:
                  type: string
                  format: binary
                  description: Upload file PDF
                id_card:
                  type: string
                  format: binary
                  description: Upload file PDF/JPG/PNG
                certificate:
                  type: string
                  format: binary
                  description: Upload file PDF
      responses:
        '200':
          description: Berhasil mendaftar
          content:
            application/json:
              example:
                status: success
                access_token: 1|...
                token_type: Bearer
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          description: Gagal melakukan registrasi tentor.
          content:
            application/json:
              example:
                status: error
                message: Gagal melakukan registrasi tentor.
                debug_error: Terjadi kesalahan saat menyimpan data ke sistem.
  /user:
    get:
      tags:
        - Authentication
      summary: Mendapatkan data user aktif
      description: Endpoint utilitas untuk mengambil data user yang sedang login. Membutuhkan autentikasi.
      security:
        - bearerAuth: []
      operationId: currentUser
      responses:
        '200':
          description: Berhasil mengambil data user aktif
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                message: Unauthenticated.
  /getBankList:
    get:
      tags:
        - Payment Gateway
      security: []
      summary: Mendapatkan daftar bank
      operationId: getBankList
      responses:
        '200':
          description: Berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bank'
        '400':
          description: Permintaan tidak valid
  /validateBankAccount:
    post:
      tags:
        - Payment Gateway
      security: []
      summary: Memvalidasi nomor rekening
      operationId: validateBankAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bank_code
                - account_number
              properties:
                bank_code:
                  type: string
                  example: ID_BSI
                account_number:
                  type: string
                  example: '1234567890'
      responses:
        '200':
          description: Validasi rekening berhasil/gagal
          content:
            application/json:
              examples:
                SuccessCondition:
                  value:
                    status: success
                    account_holder_name: FETCH_HOLDER_NAME
                ValidationFailed:
                  value:
                    status: error
                    message: Gagal memverifikasi rekening
                    error_code: API_ERROR
        '400':
          description: Permintaan tidak valid
  /package/order:
    post:
      tags:
        - Payment Gateway
      security:
        - bearerAuth: []
      summary: Membuat order paket belajar
      operationId: orderPackage
      description: Endpoint untuk membuat order paket belajar dan mendapatkan URL checkout pembayaran melalui Xendit. Hanya dapat diakses oleh user dengan role student.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPackageRequest'
            example:
              packages:
                - id: 1
                  quantity: 2
                - id: 2
                  quantity: 1
      responses:
        '200':
          description: Order berhasil dibuat, mengembalikan checkout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCheckoutResponse'
              example:
                status: success
                data:
                  order_id: 1
                  checkout_url: https://xendit.co/web/invoices/...
        '400':
          description: Validasi request gagal atau data tidak valid
          content:
            application/json:
              examples:
                ValidationError:
                  value:
                    message: The packages field is required.
                    errors:
                      packages:
                        - The packages field is required.
        '401':
          description: Unauthorized - Token tidak valid atau tidak ada
        '403':
          description: Forbidden - Hanya student yang dapat mengakses endpoint ini
        '500':
          description: Error saat membuat invoice atau database transaction gagal
          content:
            application/json:
              example:
                message: 'Gagal melakukan checkout: Gagal membuat invoice: Invalid input data'
                exception: Exception
  /getPackages:
    get:
      tags:
        - Package
      summary: Mendapatkan daftar paket belajar
      description: Endpoint untuk mendapatkan daftar paket belajar dengan informasi harga akhir dan metadata pagination. Membutuhkan autentikasi.
      security:
        - bearerAuth: []
      operationId: getPackages
      responses:
        '200':
          description: Berhasil mendapatkan daftar paket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPackagesResponse'
        '400':
          description: Permintaan tidak valid
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                message: Unauthenticated.
        '500':
          $ref: '#/components/responses/ServerError'
  /jenjang:
    get:
      tags:
        - Class
      security: []
      summary: Mendapatkan daftar jenjang kelas
      operationId: getClassLevels
      responses:
        '200':
          description: Berhasil mendapatkan daftar jenjang kelas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassLevelResponse'
        '400':
          description: Permintaan tidak valid
        '500':
          $ref: '#/components/responses/ServerError'
  /getAllClass:
    get:
      tags:
        - Class
      security: []
      summary: Mendapatkan daftar semua kelas
      operationId: getAllClass
      responses:
        '200':
          description: Berhasil mendapatkan daftar kelas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassListResponse'
        '400':
          description: Permintaan tidak valid
        '500':
          $ref: '#/components/responses/ServerError'
  /getClassByLevel:
    get:
      tags:
        - Class
      security: []
      summary: Mendapatkan kelas berdasarkan jenjang
      operationId: getClassByLevel
      parameters:
        - name: level
          in: query
          required: true
          schema:
            type: string
          example: SD
      responses:
        '200':
          description: Berhasil mendapatkan kelas berdasarkan jenjang
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassByLevelResponse'
        '400':
          description: Permintaan tidak valid
        '500':
          $ref: '#/components/responses/ServerError'
  /getAllSubjects:
    get:
      tags:
        - Subject
      security: []
      summary: Mendapatkan daftar semua mata pelajaran
      operationId: getAllSubjects
      responses:
        '200':
          description: Berhasil mendapatkan daftar mata pelajaran
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectListResponse'
        '400':
          description: Permintaan tidak valid
        '500':
          $ref: '#/components/responses/ServerError'
  /getSubjectByClass:
    get:
      tags:
        - Subject
      security: []
      summary: Mendapatkan mata pelajaran berdasarkan class ID
      operationId: getSubjectByClass
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Berhasil mendapatkan mata pelajaran berdasarkan class ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectListResponse'
        '400':
          description: Permintaan tidak valid
        '500':
          $ref: '#/components/responses/ServerError'
  /getUniqueSubjectByLevel:
    get:
      tags:
        - Subject
      security: []
      summary: Mendapatkan mata pelajaran unik berdasarkan jenjang
      operationId: getUniqueSubjectByLevel
      parameters:
        - name: level
          in: query
          required: true
          schema:
            type: string
          example: SD
      responses:
        '200':
          description: Berhasil mendapatkan mata pelajaran unik berdasarkan jenjang
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniqueSubjectByLevelResponse'
        '400':
          description: Permintaan tidak valid
        '500':
          $ref: '#/components/responses/ServerError'
  /filterCategoryPage:
    get:
      tags:
        - Course Catalog
      security: []
      summary: Filter data halaman kategori kursus
      description: |
        Mengembalikan level dan daftar subject berdasarkan kategori dan level.
        Catatan aturan domain:
        - Sistem tidak memiliki kolom kategori akademik/non-akademik pada tabel kelas.
        - Kategori non-akademik direpresentasikan dengan level `umum`.
        Perilaku endpoint:
        - Jika `category=akademik`, response `levels` hanya menampilkan jenjang akademik (mis. SD, SMP, SMA) dan mengecualikan `umum`.
        - Jika `category=umum`, response `levels` bernilai `null` dan subject diambil untuk level `umum`.
      operationId: filterCategoryPage
      parameters:
        - name: category
          in: query
          required: false
          description: |
            Kategori kursus untuk kebutuhan filter UI.
            Nilai `umum` dipakai sebagai representasi non-akademik.
          schema:
            type: string
            enum:
              - akademik
              - umum
          example: akademik
        - name: level
          in: query
          required: false
          schema:
            type: string
          description: |
            Jenjang yang dipakai saat `category=akademik`.
            Jika kosong, backend menggunakan default `sd`.
            Untuk `category=umum`, nilai ini diabaikan karena subject selalu diambil dari level `umum`.
          example: SD
      responses:
        '200':
          description: Berhasil mengambil data filter kategori sesuai aturan akademik/non-akademik
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterCategoryPageResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'
  /meStudent:
    get:
      tags:
        - User Profile
      summary: Mengambil biodata siswa
      description: Endpoint untuk mendapatkan biodata siswa yang sedang login. Membutuhkan autentikasi.
      security:
        - bearerAuth: []
      operationId: studentBiodata
      responses:
        '200':
          description: Berhasil mengambil biodata siswa
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/StudentEntity'
        '400':
          description: Permintaan tidak valid
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                message: Unauthenticated.
        '500':
          description: Gagal mengambil biodata siswa
          content:
            application/json:
              example:
                status: failed
                message: Gagal mengambil biodata siswa
                debug_error: Error message
  /updateStudentBiodata:
    patch:
      tags:
        - User Profile
      summary: Memperbarui biodata siswa
      description: Endpoint untuk memperbarui biodata siswa yang sedang login. Membutuhkan autentikasi.
      security:
        - bearerAuth: []
      operationId: updateStudentBiodata
      requestBody:
        $ref: '#/components/requestBodies/UpdateStudentBiodata'
      responses:
        '200':
          description: Berhasil memperbarui biodata siswa
          content:
            application/json:
              example:
                status: success
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                message: Unauthenticated.
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          description: Gagal memperbarui biodata siswa
          content:
            application/json:
              example:
                status: failed
                message: Gagal memperbarui biodata siswa
                debug_error: Error message
  /tutor/profile:
    put:
      tags:
        - User Profile
      summary: Memperbarui biodata tutor
