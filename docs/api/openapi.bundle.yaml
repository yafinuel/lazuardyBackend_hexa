          description: Status jadwal yang ingin difilter.
        - name: learning_method
          in: query
          required: false
          schema:
            type: string
            enum:
              - online
              - offline
            example: online
          description: Metode pembelajaran yang ingin difilter.
        - name: student_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
